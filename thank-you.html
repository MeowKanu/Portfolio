<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Kanak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b1120;
    --bg2:       #101828;
    --bg3:       #16202e;
    --cyan:      #00d4d8;
    --cyan-dim:  #00a8ac;
    --text:      #e8edf5;
    --muted:     #7a8fa6;
    --border:    rgba(0,212,216,.15);
    --card:      rgba(22,32,46,.85);
    --font-disp: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    opacity: .35;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3.5rem 3rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    animation: rise .6s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  .check-wrap {
    width: 72px; height: 72px;
    margin: 0 auto 1.6rem;
    border-radius: 50%;
    background: rgba(0,212,216,.1);
    border: 1px solid rgba(0,212,216,.35);
    display: flex; align-items: center; justify-content: center;
  }
  .check-wrap svg {
    width: 32px; height: 32px;
  }
  .check-wrap path {
    stroke: var(--cyan);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: draw .5s ease .3s forwards;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: .75rem;
    color: var(--cyan);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: .8rem;
  }

  h1 {
    font-family: var(--font-disp);
    font-size: clamp(1.7rem, 5vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -.01em;
    margin-bottom: .9rem;
  }
  h1 em { font-style: normal; color: var(--cyan); }

  p {
    color: var(--muted);
    font-size: .95rem;
    line-height: 1.6;
    margin-bottom: 2.2rem;
  }

  .actions {
    display: flex;
    gap: .8rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex; align-items: center; gap: .45rem;
    padding: .7rem 1.5rem;
    border-radius: 8px;
    font-family: var(--font-disp);
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .03em;
    text-decoration: none;
    transition: all .2s;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: var(--cyan); color: #0b1120; }
  .btn-primary:hover { background: #00f0f5; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,216,.3); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); transform: translateY(-2px); }

  .footer-note {
    margin-top: 2.4rem;
    padding-top: 1.4rem;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: .72rem;
    color: var(--muted);
  }
  .footer-note span { color: var(--cyan); }
</style>
</head>
<body>

<div class="card">
  <div class="check-wrap">
    <svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6"/></svg>
  </div>
  <div class="eyebrow">&gt;_ message delivered</div>
  <h1>Thanks for <em>reaching out</em></h1>
  <p>Your message has landed in my inbox. I read everything personally and usually reply within a day or two — looking forward to connecting.</p>
  <div class="actions">
    <a href="https://imkanak.vercel.app/" class="btn btn-primary">← Back to Portfolio</a>
    <a href="https://www.linkedin.com/in/kanak-kaur" target="_blank" rel="noopener" class="btn btn-ghost">Connect on LinkedIn</a>
  </div>
  <div class="footer-note">
    <span>Kanak</span> · Delhi, India
  </div>
</div>

</body>
</html>
